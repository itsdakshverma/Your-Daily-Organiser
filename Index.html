<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Organizer</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0f0b08;
  color:#f5e6d3;
}
.container { padding:15px; }
h1 { text-align:center; color:#d6a77a; }

.section {
  background:#1a1410;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 0 10px rgba(214,167,122,0.2);
}

h2 { color:#e6c3a1; }

input, textarea {
  width:90%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  background:#2a1f18;
  color:#f5e6d3;
}

.strike input[type="checkbox"]:checked + input {
  text-decoration: line-through;
  opacity:0.6;
}

.todo-item {
  display:flex;
  align-items:center;
  margin:5px 0;
}

.todo-item input[type="checkbox"] { margin-right:10px; }

.water {
  display:flex;
  justify-content: space-between;
}

.water div {
  width:30px;
  height:30px;
  border:2px solid #d6a77a;
  border-radius:50%;
  cursor:pointer;
}

.water div.active { background:#d6a77a; }

.moods span {
  font-size:24px;
  margin:5px;
  cursor:pointer;
  opacity:0.6;
}

.moods span.active {
  opacity:1;
  transform: scale(1.2);
}

.reminder { display:flex; gap:5px; }
button {
  background:#d6a77a;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>☕ My Organizer</h1>

<div class="section">
<h2>⭐ Today's Priorities</h2>
<div class="strike" id="priorities"></div>
</div>

<div class="section">
<h2>📋 Daily To-Do</h2>
<div id="todoList"></div>
</div>

<div class="section">
<h2>📝 Notes</h2>
<textarea id="notes" rows="3"></textarea>
</div>

<div class="section">
<h2>💧 Water Intake</h2>
<div class="water" id="water"></div>
</div>

<div class="section">
<h2>😊 Mood</h2>
<div class="moods" id="moods">
<span>😡</span><span>😢</span><span>😐</span>
<span>🙂</span><span>😄</span><span>🤢</span>
</div>
</div>

<div class="section">
<h2>⏰ Reminder</h2>
<div class="reminder">
<input type="text" id="reminderText" placeholder="Reminder">
<input type="time" id="reminderTime">
<button onclick="setReminder()">Set</button>
</div>
</div>

</div>

<script>

/* LOAD DATA */
let data = JSON.parse(localStorage.getItem("appData")) || {
  priorities:["","",""],
  todos:Array(10).fill(""),
  notes:"",
  water:Array(8).fill(false),
  mood:null
};

function save(){
  localStorage.setItem("appData", JSON.stringify(data));
}

/* PRIORITIES */
let pDiv=document.getElementById("priorities");
data.priorities.forEach((val,i)=>{
  let el=document.createElement("div");
  el.innerHTML=`<input type="checkbox"><input value="${val}" placeholder="Priority ${i+1}">`;
  let text=el.querySelector("input[type=text]");
  text.oninput=()=>{data.priorities[i]=text.value; save();};
  pDiv.appendChild(el);
});

/* TODO */
let todoList=document.getElementById("todoList");
data.todos.forEach((val,i)=>{
  let div=document.createElement("div");
  div.className="todo-item";
  div.innerHTML=`<input type="checkbox"><input value="${val}" placeholder="Task ${i+1}">`;
  let text=div.querySelector("input[type=text]");
  text.oninput=()=>{data.todos[i]=text.value; save();};
  todoList.appendChild(div);
});

/* NOTES */
let notes=document.getElementById("notes");
notes.value=data.notes;
notes.oninput=()=>{data.notes=notes.value; save();};

/* WATER */
let water=document.getElementById("water");
data.water.forEach((val,i)=>{
  let d=document.createElement("div");
  if(val) d.classList.add("active");
  d.onclick=()=>{
    d.classList.toggle("active");
    data.water[i]=!data.water[i];
    save();
  };
  water.appendChild(d);
});

/* MOOD */
let moods=document.querySelectorAll("#moods span");
moods.forEach((m,i)=>{
  if(data.mood===i) m.classList.add("active");
  m.onclick=()=>{
    moods.forEach(x=>x.classList.remove("active"));
    m.classList.add("active");
    data.mood=i;
    save();
  };
});

/* NOTIFICATIONS */
if ("Notification" in window) {
  Notification.requestPermission();
}

/* REMINDER */
function setReminder(){
  let text=document.getElementById("reminderText").value;
  let time=document.getElementById("reminderTime").value;

  if(!text || !time) return alert("Fill both");

  let now=new Date();
  let target=new Date();
  let [h,m]=time.split(":");

  target.setHours(h);
  target.setMinutes(m);
  target.setSeconds(0);

  let diff=target-now;
  if(diff<0) diff+=86400000;

  setTimeout(()=>{
    if(Notification.permission==="granted"){
      new Notification("Reminder",{body:text});
    }
    alert("Reminder: "+text);
  },diff);

  alert("Reminder set!");
}

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
